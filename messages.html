<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages | Sampark</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="stylesheet" href="style1.css">

<style>
.messaging-layout {
    display: flex;
    max-width: 1200px;
    margin: 40px auto;
    height: 70vh;
    border: 1px solid var(--border-glass);
    border-radius: 16px;
    overflow: hidden;
    background: var(--bg-panel);
}

/* Sidebar */
.contacts-sidebar {
    width: 320px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border-glass);
    background: rgba(0,0,0,0.3);
}

.contacts-header {
    padding: 18px;
    font-weight: 600;
    border-bottom: 1px solid var(--border-glass);
}

.contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border-glass);
    cursor: pointer;
}

.contact-item:hover,
.contact-item.active {
    background: rgba(0,229,255,0.1);
}

.contact-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--accent-blue);
    overflow: hidden;
}

/* 👇 NEW: real image */
.contact-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Chat */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px;
    border-bottom: 1px solid var(--border-glass);
    background: rgba(0,0,0,0.4);
}

.chat-messages {
    flex: 1;
    padding: 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* Messages */
.message {
    max-width: 70%;
    padding: 10px 16px;
    border-radius: 16px;
    font-size: 14px;
}

.message.received {
    align-self: flex-start;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-glass);
}

.message.sent {
    align-self: flex-end;
    background: rgba(0,229,255,0.15);
    border: 1px solid var(--border-accent);
}

/* Input */
.chat-input {
    display: flex;
    gap: 10px;
    padding: 15px;
    border-top: 1px solid var(--border-glass);
    background: rgba(0,0,0,0.2);
}

.chat-input input {
    flex: 1;
    padding: 10px 16px;
    border-radius: 20px;
    border: 1px solid var(--border-glass);
    background: rgba(0,0,0,0.5);
    color: var(--text-primary);
    font-family: var(--font-family);
}

.send-btn {
    padding: 10px 18px;
}

/* Active nav */
.nav-links a.active {
    color: var(--accent-blue);
}
</style>
</head>

<body>

<header>
<nav>
    <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 10px;">
        <img src="assets/logo.png" alt="Sampark Logo" style="height: 35px; width: 35px; object-fit: contain;">
        Sampark
    </a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="messages.html" class="active"><b>Messages</b></a>
        <a href="profile.html">Profile</a>
    </div>
</nav>
</header>

<main>
<div class="messaging-layout">

    <!-- Contacts -->
    <aside class="contacts-sidebar">
        <div class="contacts-header">Recent Conversations</div>

        <div class="contact-item active">
            <div class="contact-avatar">
                <img src="assets/post_avatar_1.png">
            </div>
            <div class="contact-info">
                <h4>Priya Sharma</h4>
                <p>Thanks for the science notes!</p>
            </div>
        </div>

        <div class="contact-item">
            <div class="contact-avatar">
                <img src="assets/post_avatar_2.png">
            </div>
            <div class="contact-info">
                <h4>Rahul Verma</h4>
                <p>Hey there!</p>
            </div>
        </div>

        <div class="contact-item">
            <div class="contact-avatar">
                <img src="assets/user_avatar.png">
            </div>
            <div class="contact-info">
                <h4>Ms. Kapoor (Teacher)</h4>
                <p>Rohan has been doing great!</p>
            </div>
        </div>
    </aside>

    <!-- Chat -->
    <div class="chat-area">
        <div class="chat-header">
            <!-- ✅ IMPORTANT: THIS is controlled by JS -->
            <div class="contact-avatar">
                <img id="chatAvatar" src="assets/post_avatar_1.png">
            </div>
            <h4>Priya Sharma</h4>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="Type a message..." onkeyup="handleMsgKeyup(event)">
            <button class="post-btn send-btn" onclick="handleSendMessage()">Send</button>
        </div>
    </div>

</div>
</main>

<footer>
<p style="text-align:center; padding:20px; color:#666; font-size:13px;">
© 2026 Sampark. All rights reserved.
</p>
</footer>

<script src="script.js"></script>

</body>
</html>
