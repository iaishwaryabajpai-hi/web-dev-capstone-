<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sampark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="style1.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .auth-container {
            width: 400px;
            padding: 40px;
            text-align: center;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
        }

        .auth-logo img {
            height: 50px;
            width: 50px;
            object-fit: contain;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
            background: rgba(0,0,0,0.3);
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 15px;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--accent-blue), #00A3FF);
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        .auth-btn:hover {
            box-shadow: 0 4px 20px rgba(0, 123, 255, 0.5);
        }

        .auth-toggle {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-toggle a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        #signupForm {
            display: none;
        }
    </style>
</head>
<body>

    <div class="glass-panel auth-container">
        <div class="auth-logo">
            <img src="assets/logo.png" alt="Sampark Logo">
            Sampark
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <h2 style="margin-bottom: 20px; font-weight: 500;">Welcome Back</h2>
            <input type="email" id="loginEmail" class="auth-input" placeholder="Email Address">
            <input type="password" id="loginPassword" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleLogin()">Log In</button>
            <div class="auth-toggle">
                Don't have an account? <a onclick="toggleAuth()">Sign up</a>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signupForm">
            <h2 style="margin-bottom: 20px; font-weight: 500;">Create Account</h2>
            <input type="text" id="signupName" class="auth-input" placeholder="Full Name">
            <input type="email" id="signupEmail" class="auth-input" placeholder="Email Address">
            <input type="password" id="signupPassword" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleSignup()">Sign Up</button>
            <div class="auth-toggle">
                Already have an account? <a onclick="toggleAuth()">Log in</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") 
            ? "http://localhost:5001/api" 
            : "/api";

        function toggleAuth() {
            let loginForm = document.getElementById("loginForm");
            let signupForm = document.getElementById("signupForm");
            
            if (loginForm.style.display === "none") {
                loginForm.style.display = "block";
                signupForm.style.display = "none";
            } else {
                loginForm.style.display = "none";
                signupForm.style.display = "block";
            }
        }

        async function handleSignup() {
            let name = document.getElementById("signupName").value;
            let email = document.getElementById("signupEmail").value;
            let password = document.getElementById("signupPassword").value;

            if (!email || !password) {
                alert("Please enter both email and password.");
                return;
            }

            try {
                let res = await fetch(API_URL + "/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name: name, email: email, password: password })
                });

                let data = await res.json();
                if (res.ok) {
                    alert("Account created successfully! You can now log in.");
                    toggleAuth();
                } else {
                    alert("Sign up failed: " + (data.error || "Unknown error"));
                }
            } catch (err) {
                console.error(err);
                alert("An error occurred during sign up.");
            }
        }

        async function handleLogin() {
            let email = document.getElementById("loginEmail").value;
            let password = document.getElementById("loginPassword").value;

            if (!email || !password) {
                alert("Please enter both email and password.");
                return;
            }

            try {
                let res = await fetch(API_URL + "/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email, password: password })
                });

                let data = await res.json();
                if (res.ok && data.token) {
                    // Store token and user data
                    localStorage.setItem("sampark_token", data.token);
                    if (data.user && data.user.user_metadata && data.user.user_metadata.name) {
                        localStorage.setItem("sampark_user", data.user.user_metadata.name);
                    }
                    
                    // Redirect to home
                    window.location.href = "index.html";
                } else {
                    alert("Login failed: " + (data.error || "Invalid credentials"));
                }
            } catch (err) {
                console.error(err);
                alert("An error occurred during login.");
            }
        }
    </script>
</body>
</html>
